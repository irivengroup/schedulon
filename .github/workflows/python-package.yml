name: Python package

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.14"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: schedulon
          POSTGRES_USER: schedulon
          POSTGRES_PASSWORD: schedulon
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U schedulon -d schedulon"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      SCHEDULON_ENV: development
      SCHEDULON_DATABASE_URL: postgresql+psycopg://schedulon:schedulon@localhost:5432/schedulon
      SCHEDULON_SECURITY_SECRET_KEY: ci-secret-key-ci-secret-key-123456
      PYTHONPATH: src

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Lint syntax and undefined names with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint style with flake8
        run: |
          flake8 . --count --exit-zero --max-complexity=12 --max-line-length=127 --statistics

      - name: Security scan with bandit
        run: |
          bandit -r src -x tests || true

      - name: Dependency audit
        run: |
          pip-audit || true

      - name: Run database migrations
        run: |
          alembic upgrade head

      - name: Test with pytest
        run: |
          pytest -q

  package:
    name: Build package
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build
        run: |
          python -m pip install --upgrade pip build

      - name: Build distributions
        run: |
          python -m build
