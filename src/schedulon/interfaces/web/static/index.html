<!doctype html>
<html><head><meta charset="utf-8"><title>Schedulon 1.0.0</title>
<style>body{font-family:Arial;background:#f6f8fb;margin:0}header{background:#111827;color:white;padding:20px}main{padding:24px}section{background:white;border:1px solid #ddd;border-radius:14px;padding:20px;margin-bottom:16px}button{padding:10px 14px;border:0;border-radius:8px;background:#2563eb;color:white;margin:4px}input{padding:8px;margin:4px}pre{background:#0b1020;color:#dbeafe;padding:12px;border-radius:10px}</style></head>
<body><header><h1>Schedulon 1.0.0 — Production Console</h1><p><a href="/docs" style="color:#93c5fd">Swagger</a> · <a href="/metrics" style="color:#93c5fd">Metrics</a></p></header>
<main><section><button onclick="load('/api/v1/ready')">Ready</button><button onclick="load('/api/v1/db/health')">DB Health</button><button onclick="post('/api/v1/admin/seed-demo',{})">Seed demo</button><button onclick="load('/api/v1/jobs')">Jobs</button><button onclick="load('/api/v1/audit-events')">Audit</button><button onclick="load('/api/v1/governance/precheck')">Precheck</button><button onclick="load('/api/v1/templates/dry-run')">Dry-run</button></section><section><pre id="out">Ready.</pre></section></main>
<script>async function load(p){const r=await fetch(p);out.textContent=JSON.stringify(await r.json(),null,2)}async function post(p,b){const r=await fetch(p,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});out.textContent=JSON.stringify(await r.json(),null,2)}</script></body></html>
