services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: schedulon
      POSTGRES_USER: schedulon
      POSTGRES_PASSWORD: schedulon
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedulon -d schedulon"]
      interval: 5s
      timeout: 5s
      retries: 20
  app:
    build:
      context: ../../..
      dockerfile: deploy/docker/prod/Dockerfile
    environment:
      SCHEDULON_DATABASE_URL: postgresql+psycopg://schedulon:schedulon@postgres:5432/schedulon
      SCHEDULON_SECURITY_SECRET_KEY: local-dev-secret-local-dev-secret-1234
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
  worker:
    build:
      context: ../../..
      dockerfile: deploy/docker/prod/Dockerfile
    command: ["schedulon","worker","--worker-id","worker-1"]
    depends_on: [app]
volumes:
  pgdata:
